<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmaan-Netra Dashboard</title>
    <!-- We use Tailwind CSS to make it look beautiful instantly -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <nav class="bg-blue-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center">
                🏗️ Nirmaan-Netra 
                <span class="text-sm font-normal ml-3 bg-red-600 px-2 py-1 rounded">Live Dashboard</span>
            </h1>
            
        </div>
    </nav>

    <div class="container mx-auto mt-8 flex flex-col md:flex-row gap-8 px-4">
        
        <!-- Left Side: Dashcam/Citizen Upload -->
        <div class="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-lg border-t-4 border-blue-500">
            <h2 class="text-xl font-bold mb-4">📸 Upload Dashcam Footage</h2>
            <p class="text-gray-600 mb-4 text-sm">Upload a street image. The AI will scan it for illegal uncovered construction materials.</p>
            
            <input type="file" id="imageInput" accept="image/*" class="w-full mb-4 border p-2 rounded">
            
            <!-- Image Preview -->
            <img id="preview" class="w-full h-48 object-cover rounded hidden mb-4 border" alt="Preview">

            <button onclick="scanImage()" id="scanBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Scan for Violations
            </button>
            <p id="loadingText" class="text-center text-blue-600 font-bold mt-2 hidden">🤖 AI is scanning...</p>
        </div>

        <!-- Right Side: Municipal Alert Feed -->
        <div class="w-full md:w-2/3 bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4">🚨 Municipal Alert Feed</h2>
            
            <div id="alertBox" class="hidden border-l-4 p-4 rounded bg-gray-50">
                <h3 id="alertTitle" class="text-lg font-bold mb-2"></h3>
                <p id="alertMessage" class="text-gray-700 mb-2"></p>
                
                <div id="detailsBox" class="mt-3 bg-white p-3 border rounded shadow-sm hidden">
                    <p class="font-semibold text-gray-800">Detected Material: <span id="matName" class="text-red-600"></span></p>
                    <p class="text-sm text-gray-600">AI Confidence: <span id="matConf"></span>%</p>
                </div>

                <button id="challanBtn" class="mt-4 bg-red-600 text-white px-4 py-2 rounded font-bold hidden hover:bg-red-700">
                    📄 Generate ₹5000 Challan Notice
                </button>
            </div>

            <div id="emptyState" class="text-center text-gray-400 mt-10">
                <p class="text-4xl mb-2">✅</p>
                <p>No active violations detected right now.</p>
            </div>
        </div>

    </div>

    <!-- The JavaScript to connect to your Python Backend -->
    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        // Show image preview when user selects a file
        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
            }
        });

        // Function that runs when the Scan button is clicked
        async function scanImage() {
            const file = imageInput.files[0];
            if (!file) {
                alert("Please select an image first!");
                return;
            }

            // UI updates
            document.getElementById('scanBtn').classList.add('hidden');
            document.getElementById('loadingText').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.add('hidden');

            // 1. Prepare the image to send to Python
            const formData = new FormData();
            formData.append("file", file);

            try {
                // 2. Call your actual backend!
                const response = await fetch("http://127.0.0.1:8000/detect", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

                // 3. Update the Dashboard with the AI results
                alertBox.classList.remove('hidden');
                
                if (data.violation_found) {
                    // Make it red and scary!
                    alertBox.className = "border-l-4 p-4 rounded border-red-500 bg-red-50";
                    document.getElementById('alertTitle').innerHTML = "⚠️ ILLEGAL MATERIAL DETECTED";
                    document.getElementById('alertTitle').className = "text-lg font-bold mb-2 text-red-700";
                    document.getElementById('alertMessage').innerText = data.message;
                    
                    document.getElementById('detailsBox').classList.remove('hidden');
                    document.getElementById('matName').innerText = data.details[0].material;
                    document.getElementById('matConf').innerText = (data.details[0].confidence * 100).toFixed(0);
                    
                    document.getElementById('challanBtn').classList.remove('hidden');
                } else {
                    // Make it green and happy!
                    alertBox.className = "border-l-4 p-4 rounded border-green-500 bg-green-50";
                    document.getElementById('alertTitle').innerHTML = "✅ SITE COMPLIANT";
                    document.getElementById('alertTitle').className = "text-lg font-bold mb-2 text-green-700";
                    document.getElementById('alertMessage').innerText = data.message;
                    
                    document.getElementById('detailsBox').classList.add('hidden');
                    document.getElementById('challanBtn').classList.add('hidden');
                }

            } catch (error) {
                console.error("Error connecting to backend:", error);
                alert("Could not connect to the AI Backend. Is the Python server running?");
            } finally {
                // Reset buttons
                document.getElementById('scanBtn').classList.remove('hidden');
                document.getElementById('loadingText').classList.add('hidden');
            }
        }
                // --- AUTO-CHALLAN PDF GENERATOR ---
        document.getElementById('challanBtn').addEventListener('click', function() {
            // Tell the library we want to make a PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Get the current date and time
            const date = new Date().toLocaleString();
            const material = document.getElementById('matName').innerText;
            
            // Fake some GPS coordinates for the Hackathon Demo
            const lat = (22.5726 + (Math.random() * 0.01)).toFixed(6);
            const lng = (88.3639 + (Math.random() * 0.01)).toFixed(6);

            // Design the PDF Document!
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(200, 0, 0); // Red color
            doc.text("MUNICIPAL E-CHALLAN / PENALTY NOTICE", 20, 20);
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0); // Black color
            doc.setFont("helvetica", "normal");
            doc.text("Issued by: Smart Bengal Municipal Enforcement", 20, 30);
            doc.text("System: Nirmaan-Netra AI Surveillance", 20, 38);
            
            // Draw a line
            doc.setLineWidth(0.5);
            doc.line(20, 45, 190, 45);
            
            // Violation Details
            doc.setFont("helvetica", "bold");
            doc.text("VIOLATION DETAILS:", 20, 60);
            
            doc.setFont("helvetica", "normal");
            doc.text(`Date & Time: ${date}`, 20, 70);
            doc.text(`Location (GPS): Lat ${lat}, Lng ${lng}`, 20, 80);
            doc.text(`Offense: Illegal dumping of uncovered construction materials`, 20, 90);
            doc.text(`Material Detected by AI: ${material}`, 20, 100);
            
            // Draw another line
            doc.line(20, 110, 190, 110);
            
            // Penalty Details
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("PENALTY AMOUNT: Rs. 5,000 /-", 20, 130);
            doc.setTextColor(200, 0, 0);
            doc.text("STATUS: UNPAID", 20, 140);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.setFont("helvetica", "italic");
            doc.text("This is an automatically generated notice under the Environmental Protection Act.", 20, 280);

            // Save and download the PDF!
            doc.save("Nirmaan_Netra_Challan.pdf");
        });
    </script>
</body>
</html>
